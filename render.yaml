services:
  - type: web
    name: ai-job-application-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: HEADLESS_BROWSER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
